version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hireflow
      POSTGRES_USER: hireflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: { context: ./backend, dockerfile: ../infra/docker/Dockerfile.backend }
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis]
    volumes: ["./backend:/app", "resume_storage:/app/storage/files"]

  worker:
    build: { context: ./backend, dockerfile: ../infra/docker/Dockerfile.worker }
    env_file: .env
    depends_on: [postgres, redis]
    volumes: ["./backend:/app", "resume_storage:/app/storage/files"]

  frontend:
    build: { context: ./frontend, dockerfile: ../infra/docker/Dockerfile.frontend }
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [backend]

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf"]
    depends_on: [frontend, backend]

volumes:
  pgdata:
  resume_storage: