version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hireflow_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hireflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: hireflow_backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot reload in dev
      - resume_uploads:/app/tmp/hireflow_uploads
    ports:
      - "8000:8000"

  # ── Celery Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: hireflow_worker
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - resume_uploads:/app/tmp/hireflow_uploads

  # ── Celery Beat (scheduler) ────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: hireflow_beat
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: hireflow_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://nginx/api/v1
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # ── Nginx ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hireflow_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  resume_uploads: